server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve legal pages directly without SPA fallback
    location = /privacy.html {
        try_files $uri =404;
    }

    location = /terms.html {
        try_files $uri =404;
    }

    # SPA fallback for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}